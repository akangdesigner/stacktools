<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; font-family: -apple-system, 'Segoe UI', sans-serif; padding: 32px; }
  .canvas { background: #1a1a2e; border-radius: 16px; padding: 48px 40px; width: 860px; position: relative; }
  .title { color: #aaa; font-size: 13px; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 0; margin-bottom: 48px; }
  .row:last-child { margin-bottom: 0; }
  .node { background: #23234a; border: 1.5px solid #3a3a6e; border-radius: 10px; padding: 14px 18px; width: 160px; flex-shrink: 0; }
  .node.trigger { border-color: #f59e0b; }
  .node.http { border-color: #3b82f6; }
  .node.code { border-color: #8b5cf6; }
  .node.slack { border-color: #22c55e; }
  .node-icon { font-size: 20px; margin-bottom: 6px; }
  .node-name { font-size: 11px; color: #e2e8f0; font-weight: 600; line-height: 1.3; }
  .node-type { font-size: 10px; color: #64748b; margin-top: 3px; }
  .arrow { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-width: 40px; }
  .arrow::before { content: ''; display: block; height: 1.5px; background: #3a3a6e; width: 100%; }
  .arrow::after { content: '▶'; color: #4a5568; font-size: 12px; position: absolute; right: -2px; }
  .label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 10px; color: #6b7280; background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
  .divider { height: 1px; background: #2a2a4a; margin: 24px 0; }
  .row-label { font-size: 11px; color: #6b7280; margin-bottom: 10px; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title">n8n workflow · 💳 訂閱費用報告</div>

  <div class="row-label">路線 A · 每月雙週報告</div>
  <div class="row">
    <div class="node trigger">
      <div class="node-icon">📅</div>
      <div class="node-name">每月排程</div>
      <div class="node-type">Schedule Trigger</div>
    </div>
    <div class="arrow"><span class="label">每月 1 日 9am</span></div>
    <div class="node http">
      <div class="node-icon">🌐</div>
      <div class="node-name">取得訂閱清單</div>
      <div class="node-type">HTTP Request</div>
    </div>
    <div class="arrow"></div>
    <div class="node code">
      <div class="node-icon">⚙️</div>
      <div class="node-name">組裝報告訊息</div>
      <div class="node-type">Code</div>
    </div>
    <div class="arrow"></div>
    <div class="node slack">
      <div class="node-icon">💬</div>
      <div class="node-name">Send a message</div>
      <div class="node-type">Slack</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="row-label">路線 B · 每日 3 天到期提醒</div>
  <div class="row">
    <div class="node trigger">
      <div class="node-icon">⏰</div>
      <div class="node-name">每日排程</div>
      <div class="node-type">Schedule Trigger</div>
    </div>
    <div class="arrow"><span class="label">每天 9am</span></div>
    <div class="node http">
      <div class="node-icon">🌐</div>
      <div class="node-name">取得訂閱清單<br>（提醒）</div>
      <div class="node-type">HTTP Request</div>
    </div>
    <div class="arrow"></div>
    <div class="node code">
      <div class="node-icon">🔔</div>
      <div class="node-name">3天到期提醒</div>
      <div class="node-type">Code · 無資料即靜默</div>
    </div>
    <div class="arrow"></div>
    <div class="node slack">
      <div class="node-icon">💬</div>
      <div class="node-name">傳送提醒訊息</div>
      <div class="node-type">Slack</div>
    </div>
  </div>
</div>
</body>
</html>
